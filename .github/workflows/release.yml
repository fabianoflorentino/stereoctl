name: Release

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry-run (skip publishing actions)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'scripts/**'
      - 'site/**'
      - 'Makefile'
      - '.*/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'scripts/**'
      - 'site/**'
      - 'Makefile'
      - '.*/**'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - os: linux
            runner: ubuntu-latest
            goos: linux
            goarch: amd64
            artifact: stereoctl-linux-amd64
          - os: macos
            runner: macos-latest
            goos: darwin
            goarch: amd64
            artifact: stereoctl-darwin-amd64
          - os: macos-arm
            runner: macos-latest
            goos: darwin
            goarch: arm64
            artifact: stereoctl-darwin-arm64
          - os: windows
            runner: windows-latest
            goos: windows
            goarch: amd64
            artifact: stereoctl-windows-amd64.exe

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: go build -ldflags="-s -w" -o ${{ matrix.artifact }} .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  # ── Create and push Git tag ──────────────────────────────────────────────────
  tag:
    name: Tag
    environment: GITHUB
    needs: [build]
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'pull_request' && github.event.inputs.dry_run != 'true' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Ensure GITHUB_TOKEN env
        run: |
          if [ -n "${{ secrets.GIT_HUB_TOKEN }}" ]; then
            echo "Using secrets.GIT_HUB_TOKEN as GITHUB_TOKEN"
            echo "GITHUB_TOKEN=${{ secrets.GIT_HUB_TOKEN }}" >> $GITHUB_ENV
          else
            echo "Using runner-provided GITHUB_TOKEN (secrets.GITHUB_TOKEN)"
            echo "GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}" >> $GITHUB_ENV
          fi

      - name: Create and push tag
        id: create_tag
        run: |
          TAG_NAME="v1.0.${{ github.run_number }}"
          echo "TAG_NAME=$TAG_NAME" >> $GITHUB_ENV

          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}

          git tag $TAG_NAME
          git push origin $TAG_NAME

          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
        env:
          GITHUB_TOKEN: ${{ env.GITHUB_TOKEN }}

    outputs:
      tag_name: ${{ steps.create_tag.outputs.tag_name }}

  # ── Create GitHub Release ────────────────────────────────────────────────────
  release:
    name: Release
    environment: GITHUB
    needs: [build, tag]
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'pull_request' && github.event.inputs.dry_run != 'true' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag.outputs.tag_name }}
          name: ${{ needs.tag.outputs.tag_name }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download stereoctl-linux-amd64
        uses: actions/download-artifact@v4
        with:
          name: stereoctl-linux-amd64
          path: dist

      - name: Download stereoctl-darwin-amd64
        uses: actions/download-artifact@v4
        with:
          name: stereoctl-darwin-amd64
          path: dist

      - name: Download stereoctl-darwin-arm64
        uses: actions/download-artifact@v4
        with:
          name: stereoctl-darwin-arm64
          path: dist

      - name: Download stereoctl-windows-amd64.exe
        uses: actions/download-artifact@v4
        with:
          name: stereoctl-windows-amd64.exe
          path: dist

      - name: Upload stereoctl-linux-amd64
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: dist/stereoctl-linux-amd64
          asset_name: stereoctl-linux-amd64
          asset_content_type: application/octet-stream
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload stereoctl-darwin-amd64
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: dist/stereoctl-darwin-amd64
          asset_name: stereoctl-darwin-amd64
          asset_content_type: application/octet-stream
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload stereoctl-darwin-arm64
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: dist/stereoctl-darwin-arm64
          asset_name: stereoctl-darwin-arm64
          asset_content_type: application/octet-stream
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload stereoctl-windows-amd64.exe
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: dist/stereoctl-windows-amd64.exe
          asset_name: stereoctl-windows-amd64.exe
          asset_content_type: application/octet-stream
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
